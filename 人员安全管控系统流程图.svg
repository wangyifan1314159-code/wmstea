<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" font-family="Microsoft YaHei, SimHei, Arial, sans-serif">

  <!-- ===== 红色大方框 背景与外框 ===== -->
  <rect x="4" y="4" width="892" height="472" rx="12" fill="#fff5f5"/>
  <rect x="4" y="4" width="892" height="472" rx="12" fill="none" stroke="#cc0000" stroke-width="6"/>

  <!-- ===== 标题区 ===== -->
  <rect x="22" y="18" width="856" height="66" rx="10" fill="#1a3e6e" stroke="#0d2b50" stroke-width="2"/>
  <text x="450" y="44" text-anchor="middle" font-size="18" fill="white" font-weight="bold">人员全域安全管控与远程无人化操作系统</text>
  <text x="450" y="67" text-anchor="middle" font-size="13" fill="#a8c8ff">核心：人从险区撤出 · 行为全程管控 · 操作标准化 · 应急全联动</text>

  <!-- ===== 标题到四大模块连接线 ===== -->
  <line x1="450" y1="84" x2="450" y2="102" stroke="#555" stroke-width="2"/>
  <line x1="141" y1="102" x2="761" y2="102" stroke="#555" stroke-width="2"/>
  <line x1="141" y1="102" x2="141" y2="112" stroke="#555" stroke-width="2"/>
  <line x1="341" y1="102" x2="341" y2="112" stroke="#555" stroke-width="2"/>
  <line x1="561" y1="102" x2="561" y2="112" stroke="#555" stroke-width="2"/>
  <line x1="761" y1="102" x2="761" y2="112" stroke="#555" stroke-width="2"/>

  <!-- ===== 四大模块（精简版，含关键技术与核心成果）===== -->

  <!-- ① 远程无人化掘进 (绿色) -->
  <rect x="28" y="112" width="226" height="84" rx="9" fill="#e8f5e9" stroke="#43a047" stroke-width="2.5"/>
  <text x="141" y="135" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="bold">① 远程无人化掘进</text>
  <text x="141" y="155" text-anchor="middle" font-size="11" fill="#555">防爆惯导＋视觉SLAM＋5G传输</text>
  <text x="141" y="174" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">→ 迎头无人 · 少人值守</text>

  <!-- ② 人员全域精准管控 (蓝色) -->
  <rect x="264" y="112" width="194" height="84" rx="9" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2.5"/>
  <text x="361" y="135" text-anchor="middle" font-size="13" fill="#0d47a1" font-weight="bold">② 人员全域管控</text>
  <text x="361" y="155" text-anchor="middle" font-size="11" fill="#555">UWB定位＋AI行为识别</text>
  <text x="361" y="174" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">→ 技术杜绝违章</text>

  <!-- ③ 标准化作业管控 (橙色) -->
  <rect x="468" y="112" width="194" height="84" rx="9" fill="#fff3e0" stroke="#fb8c00" stroke-width="2.5"/>
  <text x="565" y="135" text-anchor="middle" font-size="13" fill="#e65100" font-weight="bold">③ 标准化作业管控</text>
  <text x="565" y="155" text-anchor="middle" font-size="11" fill="#555">远程操控锁定标准流程</text>
  <text x="565" y="174" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">→ 消除人为误操作</text>

  <!-- ④ 应急避险智能联动 (粉红色) -->
  <rect x="672" y="112" width="214" height="84" rx="9" fill="#fce4ec" stroke="#e53935" stroke-width="2.5"/>
  <text x="779" y="135" text-anchor="middle" font-size="13" fill="#880e4f" font-weight="bold">④ 应急避险联动</text>
  <text x="779" y="155" text-anchor="middle" font-size="11" fill="#555">灾害预警＋逃生路线规划</text>
  <text x="779" y="174" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">→ 全程智能引导避险</text>

  <!-- ===== 汇集到综合管控平台 ===== -->
  <line x1="141" y1="196" x2="141" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="361" y1="196" x2="361" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="565" y1="196" x2="565" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="779" y1="196" x2="779" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="141" y1="252" x2="779" y2="252" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 下箭头到平台 -->
  <line x1="450" y1="252" x2="450" y2="272" stroke="#333" stroke-width="2"/>
  <polygon points="444,270 456,270 450,282" fill="#333"/>

  <!-- ===== 综合管控平台 ===== -->
  <rect x="220" y="282" width="460" height="56" rx="10" fill="#1a3e6e" stroke="#0d2b50" stroke-width="2"/>
  <text x="450" y="307" text-anchor="middle" font-size="14" fill="white" font-weight="bold">综合管控平台（地面集控中心）</text>
  <text x="450" y="328" text-anchor="middle" font-size="11" fill="#a8c8ff">数据汇聚 · 联动控制 · 全要素可视化 · 应急指挥</text>

  <!-- 平台到结论的箭头 -->
  <line x1="450" y1="338" x2="450" y2="360" stroke="#333" stroke-width="2"/>
  <polygon points="444,358 456,358 450,370" fill="#333"/>

  <!-- ===== 底部结论 ===== -->
  <rect x="120" y="370" width="660" height="46" rx="8" fill="#b71c1c" stroke="#7f0000" stroke-width="1.5"/>
  <text x="450" y="399" text-anchor="middle" font-size="14" fill="white" font-weight="bold">彻底消除人为因素引发的安全风险</text>

  <!-- ===== 图例 ===== -->
  <line x1="640" y1="448" x2="680" y2="448" stroke="#555" stroke-width="2"/>
  <text x="686" y="452" font-size="11" fill="#555">有线传输</text>
  <line x1="750" y1="448" x2="790" y2="448" stroke="#555" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="796" y="452" font-size="11" fill="#555">无线传输</text>

</svg>
